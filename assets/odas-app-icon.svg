<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Hintergrund-Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#7eb8f7"/>
      <stop offset="100%" stop-color="#3d3fa5"/>
    </linearGradient>
    <!-- Schatten-Filter -->
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="6" stdDeviation="10" flood-color="#000" flood-opacity="0.30"/>
    </filter>
  </defs>

  <!-- Hintergrund -->
  <rect width="512" height="512" rx="108" ry="108" fill="url(#bgGrad)"/>

  <!-- Optional: Glanz-Overlay oben-links -->
  <ellipse cx="160" cy="140" rx="180" ry="160" fill="white" fill-opacity="0.07"/>

  <!-- Motiv: Datenanalyse KI -->
  <g filter="url(#shadow)">
    <!-- Gehirn / Netzwerk-Knoten -->
    <circle cx="256" cy="220" r="40" fill="none" stroke="#ffffff" stroke-width="20"/>
    <circle cx="160" cy="300" r="30" fill="#ffffff"/>
    <circle cx="352" cy="300" r="30" fill="#ffffff"/>
    <circle cx="256" cy="380" r="30" fill="#ffffff"/>
    <!-- Verbindungen -->
    <path d="M 230 245 L 180 280" stroke="#ffffff" stroke-width="20" stroke-linecap="round"/>
    <path d="M 282 245 L 332 280" stroke="#ffffff" stroke-width="20" stroke-linecap="round"/>
    <path d="M 185 315 L 235 365" stroke="#ffffff" stroke-width="20" stroke-linecap="round"/>
    <path d="M 327 315 L 277 365" stroke="#ffffff" stroke-width="20" stroke-linecap="round"/>
    <!-- KI Sparkles -->
    <path d="M 360 140 Q 380 140 380 120 Q 380 140 400 140 Q 380 140 380 160 Q 380 140 360 140 Z" fill="#ffffff"/>
    <path d="M 120 180 Q 135 180 135 165 Q 135 180 150 180 Q 135 180 135 195 Q 135 180 120 180 Z" fill="#ffffff"/>
  </g>
</svg>